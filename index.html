<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oracle Access Request Lookup</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      color: #1a1a2e;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 2.5rem;
      width: 100%;
      max-width: 1020px;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    .btn-sheet {
      margin-left: auto;
      padding: 0.4rem 0.9rem;
      background: #1a73e8;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .btn-sheet:hover:not(:disabled) { background: #1558b0; }

    .oracle-logo {
      width: 36px;
      height: 36px;
      background: #c74634;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .oracle-logo svg { width: 22px; height: 22px; fill: #fff; }

    .card-header h1 {
      font-size: 1.25rem;
      font-weight: 600;
      color: #1a1a2e;
      line-height: 1.2;
    }

    .card-header p {
      font-size: 0.8rem;
      color: #6b7280;
      margin-top: 2px;
    }

    .section-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #9ca3af;
      margin-bottom: 0.75rem;
    }

    .credentials-box {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 1.25rem;
      margin-bottom: 1.25rem;
    }

    .field {
      margin-bottom: 1rem;
    }

    .field:last-child { margin-bottom: 0; }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: #374151;
      margin-bottom: 0.35rem;
    }

    input[type="text"],
    input[type="password"],
    input[type="url"] {
      width: 100%;
      padding: 0.55rem 0.75rem;
      border: 1.5px solid #d1d5db;
      border-radius: 6px;
      font-size: 0.9rem;
      color: #111827;
      background: #fff;
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }

    input:focus {
      border-color: #c74634;
      box-shadow: 0 0 0 3px rgba(199,70,52,0.12);
    }

    input::placeholder { color: #9ca3af; }

    .lookup-row {
      display: flex;
      gap: 0.65rem;
      margin-bottom: 1.5rem;
    }

    .lookup-row input { flex: 1; }

    button {
      padding: 0.55rem 1.2rem;
      background: #c74634;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, opacity 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }

    button:hover:not(:disabled) { background: #a83929; }
    button:disabled { opacity: 0.55; cursor: not-allowed; }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }

    button.loading .spinner { display: block; }
    button.loading .btn-label { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .result {
      border-radius: 8px;
      padding: 1.1rem 1.25rem;
      font-size: 0.9rem;
      display: none;
    }

    .result.success {
      display: block;
      background: #f0fdf4;
      border: 1.5px solid #86efac;
      color: #166534;
    }

    .result.error {
      display: block;
      background: #fff1f2;
      border: 1.5px solid #fca5a5;
      color: #991b1b;
    }

    .result-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.3rem 0;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }

    .result-row:last-child { border-bottom: none; }

    .result-key {
      font-weight: 500;
      font-size: 0.8rem;
      opacity: 0.75;
    }

    .result-val {
      font-weight: 700;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 0.9rem;
      letter-spacing: 0.02em;
    }

    .error-msg { line-height: 1.5; }
    .error-icon { font-size: 1rem; margin-right: 0.35rem; }

    .rules-section {
      margin-top: 0.9rem;
      border-top: 1px solid rgba(22,101,52,0.15);
      padding-top: 0.9rem;
    }

    .rules-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #166534;
      opacity: 0.7;
      margin-bottom: 0.6rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .rules-count {
      background: rgba(22,101,52,0.12);
      border-radius: 99px;
      padding: 0.05rem 0.45rem;
      font-size: 0.68rem;
    }

    .rules-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
    }

    .rules-table th {
      text-align: left;
      padding: 0.3rem 0.5rem;
      font-weight: 600;
      font-size: 0.7rem;
      opacity: 0.6;
      border-bottom: 1px solid rgba(22,101,52,0.2);
    }

    .rules-table td {
      padding: 0.4rem 0.5rem;
      border-bottom: 1px solid rgba(22,101,52,0.08);
      vertical-align: top;
      word-break: break-word;
    }

    .rules-table tr:last-child td { border-bottom: none; }

    .rules-table .mono {
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 0.75rem;
    }

    .role-link {
      color: inherit;
      text-decoration: underline;
      text-decoration-style: dotted;
      cursor: pointer;
    }

    .role-link:hover { text-decoration-style: solid; }

    .no-rules {
      font-size: 0.82rem;
      opacity: 0.6;
      font-style: italic;
    }

    .rules-error {
      font-size: 0.8rem;
      color: #92400e;
      background: #fffbeb;
      border: 1px solid #fcd34d;
      border-radius: 6px;
      padding: 0.5rem 0.75rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .note {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: #9ca3af;
      line-height: 1.5;
      text-align: center;
    }

    .section-divider {
      border: none;
      border-top: 1.5px solid #e5e7eb;
      margin: 1.75rem 0 1.5rem;
    }

    /* ── Cost center multi-result table ───────────────────────────────────── */
    .cc-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }

    .cc-table th {
      text-align: left;
      padding: 0.35rem 0.55rem;
      font-size: 0.7rem;
      font-weight: 600;
      color: #166534;
      opacity: 0.75;
      border-bottom: 1.5px solid rgba(22,101,52,0.25);
      white-space: nowrap;
    }

    .cc-table td {
      padding: 0.42rem 0.55rem;
      border-bottom: 1px solid rgba(22,101,52,0.1);
      vertical-align: middle;
      word-break: break-word;
    }

    .cc-table tr:last-child td { border-bottom: none; }

    .cc-table .cc-code {
      font-family: "SF Mono", "Fira Code", monospace;
      font-weight: 700;
      font-size: 0.8rem;
      white-space: nowrap;
    }

    .cc-table tr.cc-not-found td {
      color: #92400e;
      background: rgba(254,215,170,0.2);
    }

    .cc-table .cc-error-msg {
      font-style: italic;
      font-size: 0.78rem;
    }

    /* ── Candidate disambiguation list ───────────────────────────────────────── */
    .result.info {
      display: block;
      background: #eff6ff;
      border: 1.5px solid #93c5fd;
      color: #1e3a5f;
    }

    .candidates-header {
      font-size: 0.82rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
    }

    .candidates-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    .candidates-table th {
      text-align: left;
      padding: 0.3rem 0.5rem;
      font-size: 0.7rem;
      font-weight: 600;
      opacity: 0.65;
      border-bottom: 1px solid rgba(30,58,95,0.2);
    }

    .candidates-table td {
      padding: 0.45rem 0.5rem;
      border-bottom: 1px solid rgba(30,58,95,0.08);
      vertical-align: middle;
    }

    .candidates-table tr:last-child td { border-bottom: none; }

    .candidate-row { cursor: pointer; }

    .candidate-row:hover td { background: rgba(147,197,253,0.25); }

    .candidates-table .cand-num {
      font-family: "SF Mono", "Fira Code", monospace;
      font-weight: 700;
      font-size: 0.8rem;
      white-space: nowrap;
    }

</style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <div class="oracle-logo">
        <!-- Oracle-style "O" mark -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm0-14c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6zm0 10c-2.21 0-4-1.79-4-4s1.79-4 4-4 4 1.79 4 4-1.79 4-4 4z"/>
        </svg>
      </div>
      <div>
        <h1>Oracle HCM Position Lookup</h1>
        <p>Retrieve position code by person number or name</p>
      </div>
      <button class="btn-sheet" onclick="window.hcmAPI.openExternal('https://docs.google.com/spreadsheets/d/1CWRPfGTcwE3mSFKUr4Vn7HzsRaxVOG9D/edit?usp=drive_link&ouid=112059358227161727022&rtpof=true&sd=true')">
        Open Sheet
      </button>
    </div>

    <p class="section-label">Connection &amp; Credentials</p>
    <div class="credentials-box">
      <div class="field">
        <label for="baseUrl">HCM Base URL</label>
        <input type="url" id="baseUrl" value="https://fa-exci-saasfaprod1.fa.ocs.oraclecloud.com" />
      </div>
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" value="801391227" autocomplete="username" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
      </div>
    </div>

    <p class="section-label">Lookup</p>
    <div class="lookup-row">
      <input type="text" id="personNumber" placeholder="Person Number or Name" />
      <button id="lookupBtn" onclick="lookup()">
        <span class="spinner"></span>
        <span class="btn-label">Look Up</span>
      </button>
    </div>

    <div class="result" id="result"></div>

    <hr class="section-divider" />

    <p class="section-label">Cost Center Report</p>
    <div class="lookup-row">
      <input type="text" id="costCenter" placeholder="Cost Center(s), e.g. 1001, 1002, 1003" />
      <button id="ccBtn" onclick="runCCReport()">
        <span class="spinner"></span>
        <span class="btn-label">Run Report</span>
      </button>
    </div>

    <div class="result" id="ccResult"></div>

    <p class="note">Credentials are never stored. All requests are made securely via the desktop app — no browser CORS restrictions.</p>
  </div>

  <script>
    // ── Restore saved settings on startup ──────────────────────────────────────
    window.hcmAPI.getSettings().then(s => {
      if (s.baseUrl)   document.getElementById('baseUrl').value   = s.baseUrl;
      if (s.username)  document.getElementById('username').value  = s.username;
    });

    document.getElementById('costCenter').addEventListener('keydown', e => {
      if (e.key === 'Enter') runCCReport();
    });

    ['baseUrl', 'username', 'password', 'personNumber'].forEach(id => {
      document.getElementById(id).addEventListener('keydown', e => {
        if (e.key === 'Enter') lookup();
      });
    });

    async function lookup() {
      const baseUrl    = document.getElementById('baseUrl').value.trim().replace(/\/$/, '');
      const username   = document.getElementById('username').value.trim();
      const password   = document.getElementById('password').value;
      const searchTerm = document.getElementById('personNumber').value.trim();
      const btn        = document.getElementById('lookupBtn');
      const resultEl   = document.getElementById('result');

      // Basic validation
      if (!baseUrl || !username || !password || !searchTerm) {
        showError('All fields are required, including a Person Number or Name.');
        return;
      }

      window.hcmAPI.saveSettings({ baseUrl, username });
      document.getElementById('costCenter').value = '';
      const ccResultEl = document.getElementById('ccResult');
      ccResultEl.className = 'result';
      ccResultEl.innerHTML = '';

      // Loading state
      btn.disabled = true;
      btn.classList.add('loading');
      resultEl.className = 'result';
      resultEl.innerHTML = '';

      try {
        const result = await doLookup(baseUrl, username, password, searchTerm);
        if (result.candidates) {
          showCandidates(result.candidates);
        } else {
          showSuccess(result);
        }
      } catch (err) {
        showError(err.message);
      } finally {
        btn.disabled = false;
        btn.classList.remove('loading');
      }
    }

    async function doLookup(baseUrl, username, password, searchTerm) {
      const result = await window.hcmAPI.lookup({ baseUrl, username, password, searchTerm });
      if (!result.ok) throw new Error(result.error);
      if (result.candidates) return { candidates: result.candidates };
      return {
        positionCode     : result.positionCode,
        positionName     : result.positionName,
        provisioningRules: result.provisioningRules,
        rulesError       : result.rulesError,
        autoProvRules    : result.autoProvRules,
        autoProvError    : result.autoProvError,
        personNumber     : result.personNumber,
        displayName      : result.displayName,
      };
    }

    function showCandidates(candidates) {
      const el = document.getElementById('result');
      el.className = 'result info';
      const rows = candidates.map(c => `
        <tr class="candidate-row" onclick="selectCandidate('${c.personNumber ?? ''}')">
          <td class="cand-num">${esc(c.personNumber ?? '—')}</td>
          <td>${esc(c.displayName ?? '—')}</td>
        </tr>`).join('');
      el.innerHTML = `
        <p class="candidates-header">Multiple workers found — select one:</p>
        <table class="candidates-table">
          <thead><tr><th>Person #</th><th>Name</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    function selectCandidate(personNumber) {
      document.getElementById('personNumber').value = personNumber;
      lookup();
    }

    function showSuccess({ personNumber, displayName, positionCode, positionName, provisioningRules, rulesError, autoProvRules, autoProvError }) {
      const el = document.getElementById('result');
      el.className = 'result success';

      let rulesHtml;
      if (rulesError) {
        rulesHtml = `<p class="rules-error">&#9888; Could not load provisioning rules: ${esc(rulesError)}</p>`;
      } else if (provisioningRules.length === 0) {
        rulesHtml = `<p class="no-rules">No auto-provisioning rules found for this position.</p>`;
      } else {
        rulesHtml = `
          <table class="rules-table">
            <thead>
              <tr>
                <th>Role Code</th>
                <th>Date Assigned</th>
                <th>Last Updated</th>
              </tr>
            </thead>
            <tbody>
              ${provisioningRules.map(role => {
                const code = role.RoleCode ?? '';
                const cMatch  = code.match(/DAV_SEC_(C\d+)/);
                const segCode = !cMatch && code.startsWith('DAV_SEC_')
                  ? (code.match(/DAV_SEC_([^_]+)/)?.[1] ?? null)
                  : null;
                const roleCodeHtml = cMatch
                  ? `<a class="role-link" href="#" onclick="event.preventDefault(); lookupHierarchy('${cMatch[1]}')">${esc(code)}</a>`
                  : segCode
                    ? `<a class="role-link" href="#" onclick="event.preventDefault(); addToCostCenter('${esc(segCode)}')">${esc(code)}</a>`
                    : esc(code || '—');
                return `<tr>
                  <td class="mono">${roleCodeHtml}</td>
                  <td>${esc(formatDate(role.CreationDate) ?? '—')}</td>
                  <td>${esc(formatDate(role.LastUpdateDate) ?? '—')}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>`;
      }

      const nameRow = displayName
        ? `<div class="result-row">
          <span class="result-key">Name</span>
          <span class="result-val">${esc(displayName)}</span>
        </div>`
        : '';

      el.innerHTML = `
        <div class="result-row">
          <span class="result-key">Person Number</span>
          <span class="result-val">${esc(personNumber)}</span>
        </div>
        ${nameRow}
        <div class="result-row">
          <span class="result-key">Position Code</span>
          <span class="result-val">${esc(positionCode)}</span>
        </div>
        ${positionName ? `
        <div class="result-row">
          <span class="result-key">Position Name</span>
          <span class="result-val" style="font-family:inherit;letter-spacing:normal">${esc(positionName)}</span>
        </div>` : ''}
        <div class="rules-section">
          <p class="rules-label">
            Assigned Roles
            ${!rulesError ? `<span class="rules-count">${provisioningRules.length}</span>` : ''}
          </p>
          ${rulesHtml}
        </div>
        <div class="rules-section">
          <p class="rules-label">
            Auto-Provisioning Rules
            ${!autoProvError ? `<span class="rules-count">${(autoProvRules ?? []).length}</span>` : ''}
          </p>
          ${autoProvError
            ? `<p class="rules-error">&#9888; Could not load auto-provisioning rules: ${esc(autoProvError)}</p>`
            : (autoProvRules ?? []).length === 0
              ? `<p class="no-rules">No auto-provisioning rules found for this position.</p>`
              : (() => {
                  const cols = ['MAPPING_NAME', 'DEPARTMENT', 'JOB', 'ROLE'];
                  return `<table class="rules-table">
                    <thead><tr>${cols.map(h => `<th>${esc(h)}</th>`).join('')}</tr></thead>
                    <tbody>
                      ${autoProvRules.map(row =>
                        `<tr>${cols.map(h => `<td class="mono">${esc(row[h] ?? '—')}</td>`).join('')}</tr>`
                      ).join('')}
                    </tbody>
                  </table>`;
                })()
          }
        </div>
`;
    }

    function formatDate(dateStr) {
      if (!dateStr) return null;
      const d = new Date(dateStr);
      if (isNaN(d.getTime())) return dateStr;
      return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
    }

    function showError(msg) {
      const el = document.getElementById('result');
      el.className = 'result error';
      el.innerHTML = `<span class="error-icon">&#9888;</span><span class="error-msg">${esc(msg)}</span>`;
    }

    // ── Cost Center Report ─────────────────────────────────────────────────────

    async function runCCReport() {
      const costCenter = document.getElementById('costCenter').value.trim();
      const btn        = document.getElementById('ccBtn');
      const resultEl   = document.getElementById('ccResult');

      if (!costCenter) {
        showCCError('Please enter one or more Cost Center numbers.');
        return;
      }

      btn.disabled = true;
      btn.classList.add('loading');
      resultEl.className = 'result';
      resultEl.innerHTML = '';

      try {
        const baseUrl  = document.getElementById('baseUrl').value.trim();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        window.hcmAPI.saveSettings({ baseUrl, username });
        const result = await window.hcmAPI.ccReport({ baseUrl, username, password, costCenter });
        if (!result.ok) throw new Error(result.error);
        showCCResults(result.results);
      } catch (err) {
        showCCError(err.message);
      } finally {
        btn.disabled = false;
        btn.classList.remove('loading');
      }
    }

    function showCCResults(results) {
      const el = document.getElementById('ccResult');
      el.className = 'result success';

      const rows = results.map(r => {
        if (r.error) {
          return `<tr class="cc-not-found">
            <td class="cc-code">${esc(r.costCenter)}</td>
            <td colspan="4" class="cc-error-msg">&#9888; ${esc(r.error)}</td>
          </tr>`;
        }
        const managerDisplay = r.manager
          ? esc(r.manager) + (r.managerPersonNum ? ` (${esc(r.managerPersonNum)})` : '')
          : '—';
        return `<tr>
          <td class="cc-code">${esc(r.costCenter)}</td>
          <td>${esc(r.departmentName   ?? '—')}</td>
          <td>${managerDisplay}</td>
          <td>${esc(r.managerStatus   ?? '—')}</td>
          <td>${esc(r.managerEmail    ?? '—')}</td>
        </tr>`;
      }).join('');

      el.innerHTML = `
        <table class="cc-table">
          <thead>
            <tr>
              <th>Cost Center</th>
              <th>Department</th>
              <th>Manager</th>
              <th>Manager Status</th>
              <th>Manager Email</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    function showCCError(msg) {
      const el = document.getElementById('ccResult');
      el.className = 'result error';
      el.innerHTML = `<span class="error-icon">&#9888;</span><span class="error-msg">${esc(msg)}</span>`;
    }

    // ── Add single cost center to the CC Report field ─────────────────────────
    //
    // Called when a non-C DAV_SEC role code link is clicked.
    // Appends the code to the comma-delimited Cost Center Report field
    // if it isn't already present.

    function addToCostCenter(code) {
      const field    = document.getElementById('costCenter');
      const ccResult = document.getElementById('ccResult');
      const existing = field.value.split(',').map(s => s.trim()).filter(Boolean);
      if (existing.includes(code)) {
        ccResult.className = 'result info';
        ccResult.innerHTML = `${esc(code)} is already in the Cost Center Report field.`;
        return;
      }
      existing.push(code);
      field.value = existing.join(', ');
      ccResult.className = 'result info';
      ccResult.innerHTML = `${esc(code)} added to the Cost Center Report field (${existing.length} total).`;
    }

    // ── Cost center hierarchy lookup ───────────────────────────────────────────
    //
    // Called when a DAV_SEC_C... role code link is clicked.
    // Runs the hierarchy SOAP report, filters child values where HIERARCHY_PATH
    // contains _<costCenterCode>_ and CHILD_VALUE doesn't start with 'C',
    // then populates the Cost Center Report field with the results.

    async function lookupHierarchy(costCenterCode) {
      const ccResult = document.getElementById('ccResult');
      ccResult.className = 'result info';
      ccResult.innerHTML = `Loading hierarchy for ${esc(costCenterCode)}&hellip;`;

      const baseUrl  = document.getElementById('baseUrl').value.trim();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      const result = await window.hcmAPI.ccHierarchy({ baseUrl, username, password, costCenterCode });

      if (!result.ok) {
        showCCError(`Hierarchy lookup failed: ${esc(result.error)}`);
        return;
      }

      if (result.values.length === 0) {
        showCCError(`No child cost centers found under ${esc(costCenterCode)}.`);
        return;
      }

      const field    = document.getElementById('costCenter');
      const existing = field.value.split(',').map(s => s.trim()).filter(Boolean);
      const merged   = [...new Set([...existing, ...result.values])];
      field.value    = merged.join(', ');
      ccResult.className = 'result info';
      ccResult.innerHTML = `${result.values.length} cost center${result.values.length !== 1 ? 's' : ''} merged into the Cost Center Report field (${merged.length} total).`;
    }

    // ── Shared helpers ─────────────────────────────────────────────────────────

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>
</body>
